# Development docker-compose configuration
# This extends the base docker-compose.yml with development-friendly settings

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ecocycle-app:dev
    container_name: ecocycle-app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      APP_ENV: development
      APP_DEBUG: "true"
      APP_URL: ${APP_URL:-http://localhost:8080}
      # DB connection
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-eco_cycle}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      # SMTP/Email configuration
      MAIL_DRIVER: ${MAIL_DRIVER:-smtp}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_ENCRYPTION: ${SMTP_ENCRYPTION:-tls}
      SMTP_TIMEOUT: ${SMTP_TIMEOUT:-30}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-ecoCycle}
      # PayHere Payment Gateway (Sandbox)
      # Get these from: sandbox.payhere.lk > Side Menu > Integrations
      PAYHERE_SANDBOX: "true"
      PAYHERE_MERCHANT_ID: ${PAYHERE_MERCHANT_ID:-}
      PAYHERE_MERCHANT_SECRET: ${PAYHERE_MERCHANT_SECRET:-}
      # Set to 'auto' to auto-detect ngrok tunnel URL at runtime (recommended for dev)
      # Or set to a full URL e.g. https://abc.ngrok-free.app/api/payhere/notify
      PAYHERE_NOTIFY_URL: ${PAYHERE_NOTIFY_URL:-auto}
      PAYHERE_RETURN_URL: ${PAYHERE_RETURN_URL:-http://localhost:8080/company/purchases?payment=success}
      PAYHERE_CANCEL_URL: ${PAYHERE_CANCEL_URL:-http://localhost:8080/company/purchases?payment=cancelled}
    volumes:
      # Mount source code for live development
      - ./public:/var/www/html/public:cached
      - ./src:/var/www/html/src:cached
      - ./config:/var/www/html/config:cached
      - ./database:/var/www/html/database:cached
      - ./resources:/var/www/html/resources:cached
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ecocycle-network

  # ── ngrok tunnel (auto-exposes app to the internet for PayHere notify_url) ──
  # ngrok management UI available at http://localhost:4040
  # Free account authtoken: https://dashboard.ngrok.com/get-started/your-authtoken
  ngrok:
    image: ngrok/ngrok:latest
    container_name: ecocycle-ngrok
    restart: unless-stopped
    command: http app:80 --log=stdout
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
    ports:
      - "4040:4040"  # ngrok web inspector UI
    depends_on:
      - app
    networks:
      - ecocycle-network

  db:
    image: postgres:15-alpine
    container_name: ecocycle-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-eco_cycle}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-root}
      # Enable logging for development
      POSTGRES_INITDB_ARGS: "-E UTF8"
    volumes:
      - db_data:/var/lib/postgresql/data
      # Mount init scripts
      - ./database/postgresql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-eco_cycle}",
        ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ecocycle-network

networks:
  ecocycle-network:
    driver: bridge

volumes:
  db_data:
    driver: local
