version: "3.9"

# Production override: removes dev bind mounts & phpMyAdmin, adds Caddy reverse proxy with HTTPS.

services:
  app:
    build: .
    image: ecocycle-app:latest
    restart: unless-stopped
    # No source bind mount in prod; code baked into image
    volumes: []
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    depends_on:
      - db
    networks:
      - web
      - internal

  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-eco_cycle}
      MYSQL_USER: ${DB_USERNAME:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${APP_DOMAIN:-example.com}
      EMAIL: ${SSL_EMAIL:-admin@example.com}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - app
    networks:
      - web

networks:
  web:
  internal:
    internal: true

volumes:
  db_data:
  caddy_data:
  caddy_config:
