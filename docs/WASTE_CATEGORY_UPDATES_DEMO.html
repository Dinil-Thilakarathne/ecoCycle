<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waste Category Real-Time Updates - Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .demo-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            overflow: hidden;
        }

        .demo-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .demo-header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .demo-header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .demo-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            padding: 40px;
        }

        .demo-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .demo-section h2 {
            font-size: 18px;
            color: #333;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-badge {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ef4444;
            animation: pulse 2s infinite;
        }

        .status-badge.active {
            background: #10b981;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .category-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 15px;
            background: #f9fafb;
        }

        .category-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: white;
            border-radius: 6px;
            border: 1px solid #e5e7eb;
            font-size: 14px;
        }

        .category-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            flex-shrink: 0;
        }

        .category-name {
            flex: 1;
            font-weight: 500;
            color: #1f2937;
        }

        .category-unit {
            font-size: 12px;
            color: #6b7280;
            background: #f3f4f6;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .event-log {
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 15px;
            background: #f9fafb;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 12px;
        }

        .event-item {
            margin-bottom: 10px;
            padding: 8px;
            border-radius: 4px;
            border-left: 3px solid #667eea;
            background: white;
        }

        .event-time {
            color: #6b7280;
            font-size: 11px;
        }

        .event-type {
            display: inline-block;
            margin-top: 4px;
            padding: 4px 8px;
            border-radius: 3px;
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
        }

        .event-type.created {
            background: #dcfce7;
            color: #166534;
            border-left-color: #10b981;
        }

        .event-type.updated {
            background: #dbeafe;
            color: #1e40af;
            border-left-color: #3b82f6;
        }

        .event-type.deleted {
            background: #fee2e2;
            color: #991b1b;
            border-left-color: #ef4444;
        }

        .demo-controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #e5e7eb;
            color: #374151;
        }

        .btn-secondary:hover {
            background: #d1d5db;
        }

        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            border-radius: 8px;
            padding: 16px 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease-out;
            z-index: 1000;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .notification-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            flex-shrink: 0;
        }

        .notification-icon.success {
            background: #10b981;
        }

        .notification-icon.info {
            background: #3b82f6;
        }

        .notification-icon.warning {
            background: #f59e0b;
        }

        .grid-2-col {
            @media (max-width: 768px) {
                grid-template-columns: 1fr;
            }
        }

        .empty-state {
            text-align: center;
            padding: 30px;
            color: #6b7280;
            font-size: 14px;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-card-value {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-card-label {
            font-size: 12px;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        @media (max-width: 768px) {
            .demo-content {
                grid-template-columns: 1fr;
            }

            .stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="demo-container">
        <div class="demo-header">
            <h1>🔄 Waste Category Real-Time Updates</h1>
            <p>Live demonstration of the real-time polling system</p>
        </div>

        <div class="demo-content">
            <!-- Statistics -->
            <div style="grid-column: 1 / -1;">
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-card-value" id="statCategories">0</div>
                        <div class="stat-card-label">Total Categories</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card-value" id="statEvents">0</div>
                        <div class="stat-card-label">Events Received</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card-value" id="statPolls">0</div>
                        <div class="stat-card-label">Polls Completed</div>
                    </div>
                </div>
            </div>

            <!-- Categories Section -->
            <div class="demo-section">
                <h2>
                    <span class="status-badge active"></span>
                    Active Categories
                </h2>
                <div id="categoryList" class="category-list">
                    <div class="empty-state">Loading categories...</div>
                </div>
                <div class="demo-controls">
                    <button class="btn btn-primary" onclick="addDemoCategory()">+ Add Category</button>
                    <button class="btn btn-secondary" onclick="clearEventLog()">Clear Log</button>
                </div>
            </div>

            <!-- Event Log Section -->
            <div class="demo-section">
                <h2>📋 Event Log</h2>
                <div id="eventLog" class="event-log">
                    <div class="empty-state">Waiting for events...</div>
                </div>
                <div class="demo-controls">
                    <button class="btn btn-secondary" onclick="togglePolling()">
                        <span id="toggleBtn">Stop Polling</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Sample Categories for Demo -->
    <script>
        // Demo data
        const demoCategories = [
            { id: 1, name: 'Plastic', color: '#FF6B6B', unit: 'kg' },
            { id: 2, name: 'Paper', color: '#4ECDC4', unit: 'kg' },
            { id: 3, name: 'Glass', color: '#95E1D3', unit: 'kg' },
            { id: 4, name: 'Metal', color: '#C7CEEA', unit: 'kg' },
        ];

        let categories = [...demoCategories];
        let eventCount = 0;
        let pollCount = 0;
        let isPolling = true;
        let nextId = 5;

        // Simulate WasteCategoryUpdateManager for demo
        class DemoUpdateManager {
            constructor() {
                this.listeners = {
                    created: [],
                    updated: [],
                    deleted: [],
                    refreshed: []
                };
            }

            on(eventType, callback) {
                if (this.listeners[eventType]) {
                    this.listeners[eventType].push(callback);
                }
            }

            emit(eventType, data) {
                if (this.listeners[eventType]) {
                    this.listeners[eventType].forEach(cb => cb(data));
                }
            }

            async refreshCategories() {
                return categories;
            }

            simulateEvent() {
                const eventTypes = ['created', 'updated'];
                const type = eventTypes[Math.floor(Math.random() * eventTypes.length)];

                if (type === 'created') {
                    const colors = ['#FF6B6B', '#4ECDC4', '#95E1D3', '#C7CEEA', '#F38181'];
                    const names = ['Cardboard', 'Wood', 'Electronics', 'Textiles', 'Organic'];
                    const randomName = names[Math.floor(Math.random() * names.length)];
                    const randomColor = colors[Math.floor(Math.random() * colors.length)];

                    const newCat = {
                        id: nextId++,
                        name: randomName,
                        color: randomColor,
                        unit: 'kg'
                    };
                    categories.push(newCat);
                    this.emit('created', newCat);
                }
            }
        }

        // Initialize manager
        const manager = new DemoUpdateManager();

        // Setup listeners
        manager.on('created', (data) => {
            addEvent('created', data.name);
            updateStats();
            renderCategories();
            showNotification(`✓ New category: ${data.name}`, 'success');
        });

        manager.on('updated', (data) => {
            addEvent('updated', data.category?.name || 'Category');
            updateStats();
            renderCategories();
            showNotification(`✓ Updated: ${data.category?.name}`, 'info');
        });

        manager.on('deleted', (data) => {
            addEvent('deleted', 'A category');
            updateStats();
            renderCategories();
            showNotification('✓ Category deleted', 'warning');
        });

        manager.on('refreshed', (data) => {
            categories = data;
            renderCategories();
        });

        // UI Functions
        function renderCategories() {
            const list = document.getElementById('categoryList');
            if (categories.length === 0) {
                list.innerHTML = '<div class="empty-state">No categories yet</div>';
                return;
            }

            list.innerHTML = categories.map(cat => `
                <div class="category-item">
                    <div class="category-color" style="background: ${cat.color}"></div>
                    <div class="category-name">${cat.name}</div>
                    <div class="category-unit">${cat.unit}</div>
                </div>
            `).join('');

            document.getElementById('statCategories').textContent = categories.length;
        }

        function addEvent(type, name) {
            eventCount++;
            const log = document.getElementById('eventLog');
            const emptyState = log.querySelector('.empty-state');
            if (emptyState) emptyState.remove();

            const eventEl = document.createElement('div');
            eventEl.className = 'event-item';
            const now = new Date().toLocaleTimeString();
            eventEl.innerHTML = `
                <div class="event-time">${now}</div>
                <div class="event-type ${type}">${type}</div>
                <div style="margin-top: 4px; font-size: 12px;">${name}</div>
            `;
            log.insertBefore(eventEl, log.firstChild);

            // Keep only last 20 events
            while (log.children.length > 20) {
                log.removeChild(log.lastChild);
            }

            document.getElementById('statEvents').textContent = eventCount;
        }

        function addDemoCategory() {
            const colors = ['#FF6B6B', '#4ECDC4', '#95E1D3', '#C7CEEA', '#F38181', '#FFD93D'];
            const names = ['Cardboard', 'Wood', 'Electronics', 'Textiles', 'Organic', 'Rubber'];
            const randomName = names[Math.floor(Math.random() * names.length)];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];

            const newCat = {
                id: nextId++,
                name: randomName,
                color: randomColor,
                unit: 'kg'
            };
            categories.push(newCat);
            manager.emit('created', newCat);
        }

        function updateStats() {
            document.getElementById('statPolls').textContent = pollCount;
        }

        function clearEventLog() {
            document.getElementById('eventLog').innerHTML = '<div class="empty-state">Event log cleared</div>';
            eventCount = 0;
            document.getElementById('statEvents').textContent = '0';
        }

        function togglePolling() {
            isPolling = !isPolling;
            document.getElementById('toggleBtn').textContent = isPolling ? 'Stop Polling' : 'Start Polling';
        }

        function showNotification(message, type) {
            const notif = document.createElement('div');
            notif.className = 'notification';
            const iconClass = type === 'success' ? '✓' : type === 'info' ? 'ℹ' : '⚠';
            notif.innerHTML = `
                <div class="notification-icon ${type}">${iconClass}</div>
                <span>${message}</span>
            `;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 3000);
        }

        // Simulate polling
        setInterval(() => {
            if (isPolling && Math.random() < 0.3) {
                pollCount++;
                manager.simulateEvent();
                updateStats();
            }
        }, 5000);

        // Initial render
        document.addEventListener('DOMContentLoaded', () => {
            renderCategories();
            updateStats();
        });
    </script>
</body>
</html>
